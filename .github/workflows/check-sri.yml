name: SRI Hash Check

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  check-sri:
    name: Verify Umami SRI Hash
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Check SRI hash
        id: sri
        run: node scripts/check-sri.mjs --fix 2>&1 | tee sri-output.txt
        continue-on-error: true

      - name: Auto-fix and create PR on mismatch
        if: steps.sri.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract new hash from check-sri output
          NEW_HASH=$(grep -o 'sha384-[A-Za-z0-9+/=]*' sri-output.txt | tail -1)
          if [ -z "$NEW_HASH" ]; then
            echo "::error::Could not extract new hash from output"
            cat sri-output.txt
            exit 1
          fi

          echo "Updating to: $NEW_HASH"

          # Update layout.tsx
          LAYOUT="src/app/[locale]/layout.tsx"
          sed -i "s|integrity=\"sha384-[A-Za-z0-9+/=]*\"|integrity=\"$NEW_HASH\"|" "$LAYOUT"

          # Verify fix
          node scripts/check-sri.mjs
          if [ $? -ne 0 ]; then
            echo "::error::Fix verification failed"
            exit 1
          fi

          # Check if a PR already exists
          EXISTING=$(gh pr list --head "fix/sri-hash" --state open --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists, skipping"
            exit 0
          fi

          # Create branch and PR
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b fix/sri-hash
          git add "$LAYOUT"
          git commit -m "fix: update Umami SRI hash after upstream script change"
          git push -f origin fix/sri-hash

          gh pr create \
            --title "fix: update Umami SRI hash" \
            --body "Automated — Umami updated their analytics script. SRI hash updated to restore analytics tracking." \
            --head fix/sri-hash

      - name: Create issue if auto-fix fails
        if: steps.sri.outcome == 'failure' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('sri-output.txt', 'utf-8');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'sri-mismatch',
            });

            if (issues.length > 0) {
              console.log('Open SRI mismatch issue already exists, skipping.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'SRI mismatch: auto-fix failed — manual update needed',
              labels: ['sri-mismatch'],
              body: '## SRI Mismatch\n\n```\n' + output + '\n```\n\nRun `node scripts/check-sri.mjs --fix` for the new hash.',
            });
