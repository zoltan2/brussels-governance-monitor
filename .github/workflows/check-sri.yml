name: SRI Hash Check

on:
  schedule:
    - cron: '0 6,14 * * *'  # 2x/day: 6h and 14h UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  check-sri:
    name: Verify & Auto-Fix Umami SRI Hash
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Check SRI hash
        id: check
        run: node scripts/check-sri.mjs 2>&1 | tee sri-output.txt
        continue-on-error: true

      - name: Auto-fix all layouts on mismatch
        if: steps.check.outcome == 'failure'
        id: fix
        run: |
          node scripts/check-sri.mjs --fix 2>&1 | tee -a sri-output.txt

          # Verify all files are now consistent
          node scripts/check-sri.mjs
          echo "fix_success=true" >> "$GITHUB_OUTPUT"

      - name: Create PR with fix
        if: steps.fix.outcome == 'success' && steps.fix.outputs.fix_success == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a PR already exists
          EXISTING=$(gh pr list --head "fix/sri-hash-auto" --state open --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists, updating branch"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b fix/sri-hash-auto
            git add -A
            git commit -m "fix: auto-update Umami SRI hash (upstream script change)"
            git push -f origin fix/sri-hash-auto
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b fix/sri-hash-auto
          git add -A
          git commit -m "fix: auto-update Umami SRI hash (upstream script change)"
          git push -f origin fix/sri-hash-auto

          gh pr create \
            --title "fix: auto-update Umami SRI hash" \
            --body "$(cat <<'BODY'
          ## Automated SRI Hash Update

          Umami has updated their `cloud.umami.is/script.js`. The SRI integrity hash
          no longer matches, causing analytics to be blocked by the browser.

          This PR updates all 3 layout files:
          - `src/app/[locale]/layout.tsx`
          - `src/app/digest/layout.tsx`
          - `src/app/livre/layout.tsx`

          **Verified**: `npm run check:sri` passes after the fix.

          > Auto-generated by the `check-sri` workflow.
          BODY
          )" \
            --head fix/sri-hash-auto

      - name: Create issue if auto-fix fails
        if: steps.check.outcome == 'failure' && steps.fix.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('sri-output.txt', 'utf-8');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'sri-mismatch',
            });

            if (issues.length > 0) {
              console.log('Open SRI mismatch issue already exists, skipping.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'SRI mismatch: auto-fix failed — manual update needed',
              labels: ['sri-mismatch'],
              body: '## SRI Mismatch\n\nThe automated fix failed.\n\n```\n' + output + '\n```\n\nRun `node scripts/check-sri.mjs --fix` locally.',
            });
