name: Pagefind freshness

on:
  pull_request:
    branches: [main]
    paths:
      - 'content/**'
      - 'messages/*.json'
      - 'velite.config.ts'
      - 'public/pagefind/**'
  # Also run on direct pushes to main (e.g. the weekly auto-generated digest,
  # committed via the prepare-digest API route, which never opens a PR). Without
  # this, content reaching main outside a PR silently bypasses the guard and the
  # committed search index goes stale until a later content PR happens to rebuild.
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'messages/*.json'
      - 'velite.config.ts'
      - 'public/pagefind/**'

jobs:
  check:
    name: Pagefind index up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify pagefind index was rebuilt alongside content changes
        env:
          # pull_request → base/head of the PR; push → before/after of the push.
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.after || github.sha }}
        run: |
          set -euo pipefail

          # On a brand-new branch or force-push, `before` is the zero SHA — fall
          # back to the parent of HEAD so the diff stays meaningful.
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA=$(git rev-parse "${HEAD_SHA}^" 2>/dev/null || echo "$HEAD_SHA")
          fi

          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          content_touched=$(printf '%s\n' "$changed" | grep -E '^(content/|messages/[^/]+\.json$|velite\.config\.ts$)' | grep -v '^content/digest/__fixtures__/' || true)
          pagefind_touched=$(printf '%s\n' "$changed" | grep -E '^public/pagefind/' || true)

          if [ -n "$content_touched" ] && [ -z "$pagefind_touched" ]; then
            {
              echo "::error::Content affecting the search index changed, but public/pagefind/ was not rebuilt."
              echo ""
              echo "Files touched that require a pagefind rebuild:"
              echo "$content_touched" | sed 's/^/  /'
              echo ""
              echo "Fix (in this PR, or a follow-up PR if this ran on a push to main):"
              echo "  rm -rf public/pagefind/"
              echo "  npm run build"
              echo "  git add public/pagefind/"
              echo "  git commit -m 'chore(search): rebuild pagefind index'"
              echo "  git push"
            } >&2
            exit 1
          fi

          echo "Pagefind freshness check passed."
          if [ -n "$content_touched" ]; then
            echo "  content changes: $(printf '%s\n' "$content_touched" | wc -l | tr -d ' ')"
          fi
          if [ -n "$pagefind_touched" ]; then
            echo "  pagefind changes: $(printf '%s\n' "$pagefind_touched" | wc -l | tr -d ' ')"
          fi
          exit 0
