name: Deploy image

# Build l'image Docker self-host (SELF_HOST=1, .next/standalone) et la pousse
# sur GHCR. Le VPS Hetzner tire ensuite cette image (timer bgm-deploy, Phase E).
# Le contenu vit dans le repo et est cuit dans l'image au build → un changement
# content/** doit produire une nouvelle image, d'où le trigger large.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/**'
      - '_audit/**'
  workflow_dispatch:

concurrency:
  group: deploy-image
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/zoltan2/brussels-governance-monitor
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build & push (linux/amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
