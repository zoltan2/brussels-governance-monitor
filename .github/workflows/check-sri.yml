name: SRI Hash Check

on:
  schedule:
    # Every day at 07:00 UTC (08:00 Brussels time)
    - cron: '0 7 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  check-sri:
    name: Verify Umami SRI Hash
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Check SRI hash
        id: sri
        run: |
          set -o pipefail
          node scripts/check-sri.mjs --fix 2>&1 | tee sri-output.txt
        continue-on-error: true

      - name: Auto-fix and create PR on mismatch
        if: steps.sri.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract new hash from output
          NEW_HASH=$(grep 'integrity=' sri-output.txt | sed 's/.*integrity="\(sha384-[^"]*\)".*/\1/')
          if [ -z "$NEW_HASH" ]; then
            echo "Could not extract new hash from output"
            exit 1
          fi

          echo "New hash: $NEW_HASH"

          # Update layout.tsx
          sed -i "s|integrity=\"sha384-[A-Za-z0-9+/=]*\"|integrity=\"$NEW_HASH\"|" src/app/\[locale\]/layout.tsx

          # Verify the fix
          node scripts/check-sri.mjs
          if [ $? -ne 0 ]; then
            echo "Fix verification failed"
            exit 1
          fi

          # Create branch and PR
          BRANCH="fix/sri-hash-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/app/\[locale\]/layout.tsx
          git commit -m "fix: update Umami SRI hash after upstream script change"
          git push origin "$BRANCH"

          gh pr create \
            --title "fix: update Umami SRI hash" \
            --body "Automated fix — Umami updated their analytics script. SRI hash updated to restore analytics tracking." \
            --head "$BRANCH"

          gh pr merge "$BRANCH" --squash --delete-branch --auto

      - name: Create issue if auto-fix fails
        if: steps.sri.outcome == 'failure' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('sri-output.txt', 'utf-8');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'sri-mismatch',
            });

            if (issues.length > 0) {
              console.log('Open SRI mismatch issue already exists, skipping.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'SRI mismatch: auto-fix failed — manual update needed',
              labels: ['sri-mismatch'],
              body: [
                '## Umami SRI Hash Mismatch — Auto-fix Failed',
                '',
                'The daily SRI check detected a hash change and the automated PR failed.',
                '**Analytics is currently blocked by the browser.**',
                '',
                '### Output',
                '```',
                output,
                '```',
                '',
                '### Manual Fix',
                '1. Run `node scripts/check-sri.mjs --fix` to get the new hash',
                '2. Update the `integrity="sha384-..."` attribute in `src/app/[locale]/layout.tsx`',
                '3. Commit, push, close this issue',
              ].join('\n'),
            });
