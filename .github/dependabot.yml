version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Brussels
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Major bumps need manual review — many deps here are cutting-edge (Next 16, Zod 4, TW 4)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Brussels
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore
